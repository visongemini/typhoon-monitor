<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>台风实时监控 · 江阴</title>
<style>
  :root{--bg:#060e1a;--sea:#0a1929;--land:#14293e;--coast:#2e5677;--fg:#e2e8f0;--fg2:#94a3b8;--fg3:#64748b;--card:#0d1b2e;--line:#1e3a5f;--red:#ff5757;--pink:#ff4d6d;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font:14px/1.6 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh}
  header{display:flex;flex-wrap:wrap;align-items:center;gap:10px 16px;padding:10px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(6,14,26,.92);backdrop-filter:blur(6px);z-index:10}
  header h1{font-size:17px;font-weight:600;letter-spacing:1px}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:999px;font-size:12px;border:1px solid var(--line);color:var(--fg2)}
  .chip b{color:var(--fg);font-weight:600}
  #alert{padding:3px 12px;border-radius:8px;font-size:13px;font-weight:600}
  .al-red{background:#3d0f14;color:#ff8080;border:1px solid #7a2020}
  .al-org{background:#3a2408;color:#ffb454;border:1px solid #7a5220}
  .al-ok{background:#0d2b1c;color:#4ade80;border:1px solid #1e5c3a}
  #refresh-box{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--fg2)}
  button{background:#123055;color:#cfe3ff;border:1px solid #29527f;border-radius:8px;padding:5px 14px;font-size:13px;cursor:pointer}
  button:hover{background:#1a4070}
  main{display:flex;flex-wrap:wrap;gap:12px;padding:12px 16px}
  #map-wrap{flex:1 1 640px;min-width:340px;position:relative;background:var(--sea);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  #map{display:block;width:100%;height:auto;cursor:grab}
  #map.panning{cursor:grabbing}
  .overlay{position:absolute;background:rgba(10,25,41,.85);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--fg2);backdrop-filter:blur(4px)}
  #legend{left:10px;bottom:10px;line-height:1.9}
  #agencies{right:10px;top:10px}
  #agencies label{display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap}
  #zoombtns{right:10px;bottom:10px;display:flex;flex-direction:column;gap:6px;padding:6px}
  #zoombtns button{padding:2px 10px;font-size:15px}
  #tooltip{position:absolute;pointer-events:none;background:rgba(6,14,26,.95);border:1px solid #29527f;border-radius:8px;padding:6px 10px;font-size:12px;color:var(--fg);display:none;z-index:20;white-space:nowrap}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex:none}
  .ln{width:22px;height:0;display:inline-block;border-top:2.5px solid;vertical-align:middle}
  aside{flex:0 1 340px;min-width:300px;display:flex;flex-direction:column;gap:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .card h3{font-size:13px;color:var(--fg2);font-weight:600;margin-bottom:10px;letter-spacing:1px}
  .kv{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;font-size:13px}
  .kv .k{color:var(--fg3);font-size:12px}
  .kv .v{font-weight:600}
  .big{font-size:30px;font-weight:700;line-height:1.2}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;color:var(--fg3);font-weight:500;padding:4px 6px;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:4px 6px;border-bottom:1px solid #12233a;white-space:nowrap}
  footer{padding:8px 16px 16px;font-size:12px;color:var(--fg3);line-height:1.8}
  a{color:#5aa2e8;text-decoration:none}
  #map text{paint-order:stroke;stroke:#0a1929;stroke-width:3px;stroke-linejoin:round}
  @keyframes pulse{0%{opacity:.8;transform:scale(1)}70%{opacity:0;transform:scale(2.6)}100%{opacity:0;transform:scale(2.6)}}
  .pulse{animation:pulse 2s ease-out infinite;transform-box:fill-box;transform-origin:center}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin 6s linear infinite;transform-box:fill-box;transform-origin:center}
</style>
</head>
<body>
<header>
  <h1>🌀 台风实时监控</h1>
  <span class="chip" id="c-name"><b>加载中…</b></span>
  <span class="chip" id="c-strong"></span>
  <span class="chip" id="c-move"></span>
  <span id="alert" class="al-ok">—</span>
  <div id="refresh-box">
    <span id="c-time"></span>
    <span id="countdown"></span>
    <button id="btn-refresh">立即刷新</button>
  </div>
</header>
<main>
  <div id="map-wrap">
    <svg id="map" viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg"><g id="world"></g></svg>
    <div class="overlay" id="agencies"></div>
    <div class="overlay" id="legend"></div>
    <div class="overlay" id="zoombtns">
      <button id="z-in">＋</button><button id="z-out">－</button><button id="z-reset" style="font-size:12px">复位</button>
    </div>
    <div id="tooltip"></div>
  </div>
  <aside>
    <div class="card" id="card-now"><h3>实况</h3><div class="kv" id="kv-now"></div></div>
    <div class="card" id="card-jy"><h3>江阴影响 · 你的位置</h3><div id="jy-body"></div></div>
    <div class="card"><h3>中央气象台预报路径</h3><div style="overflow-x:auto"><table id="fc-table"></table></div></div>
  </aside>
</main>
<footer>
  数据源：<a href="https://typhoon.slt.zj.gov.cn" target="_blank">浙江省水利厅·台风路径系统</a>（与中央气象台同源，约每小时更新实况）· 页面每10分钟自动刷新 · 风圈为按象限半径示意 · 预报有不确定性，请以<a href="http://www.nmc.cn" target="_blank">中央气象台</a>和江阴市气象局最新发布为准
</footer>
<script>
const JY = {lon:120.286, lat:31.909};
const REFRESH_MS = 10*60*1000;
const CAT_COLOR = {'热带低压':'#34d399','热带风暴':'#38bdf8','强热带风暴':'#fbbf24','台风':'#fb923c','强台风':'#f87171','超强台风':'#e879f9'};
const AGENCY = [
  {key:'中国', color:'#ff5757', w:2.5, on:true},
  {key:'日本', color:'#4da6ff', w:1.5, on:false},
  {key:'美国', color:'#c084fc', w:1.5, on:false},
  {key:'中国香港', color:'#ffd94d', w:1.5, on:false},
  {key:'中国台湾', color:'#2dd4bf', w:1.5, on:false},
];
const CITIES = [
  {n:'上海',lon:121.47,lat:31.23},{n:'杭州',lon:120.16,lat:30.29},{n:'南京',lon:118.78,lat:32.06},
  {n:'温州',lon:120.70,lat:28.00},{n:'合肥',lon:117.28,lat:31.86},{n:'徐州',lon:117.28,lat:34.26},
  {n:'青岛',lon:120.38,lat:36.07},{n:'福州',lon:119.30,lat:26.08},
];
const W=1200, H=780;
let china=null, state={data:null, idx:0}, proj=null, nextAt=0;
let vt={x:0,y:0,k:1};

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num=v=>parseFloat(v);
const fmtT=t=>{const m=String(t).match(/(\d+)-(\d+) (\d+):/);return m?`${+m[2]}日${m[3]}时`:t;};
const catColor=s=>CAT_COLOR[s]||'#94a3b8';
function hav(a,b){const R=6371,r=Math.PI/180;const dLa=(b.lat-a.lat)*r,dLo=(b.lon-a.lon)*r;const x=Math.sin(dLa/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLo/2)**2;return Math.round(2*R*Math.asin(Math.sqrt(x)));}

function makeProj(pts){
  let lo0=1e9,lo1=-1e9,la0=1e9,la1=-1e9;
  pts.forEach(p=>{lo0=Math.min(lo0,p[0]);lo1=Math.max(lo1,p[0]);la0=Math.min(la0,p[1]);la1=Math.max(la1,p[1]);});
  lo0-=.8;lo1+=.8;la0-=.8;la1+=.8;
  const mid=(la0+la1)/2, c=Math.cos(mid*Math.PI/180);
  const k=Math.min(W/(lo1-lo0), H*c/(la1-la0));
  const w=(lo1-lo0)*k, h=(la1-la0)*k/c, ox=(W-w)/2, oy=(H-h)/2;
  return {x:lon=>ox+(lon-lo0)*k, y:lat=>oy+(la1-lat)*k/c, kmPx:km=>km*k/(111*c),
    lo0,lo1,la0,la1, inView:(lon,lat)=>lon>lo0&&lon<lo1&&lat>la0&&lat<la1};
}

function ringPath(ring){
  let d='',px=-9,py=-9;
  for(const c of ring){
    const x=proj.x(c[0]),y=proj.y(c[1]);
    if(Math.abs(x-px)<.9&&Math.abs(y-py)<.9)continue;
    d+=(d?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);px=x;py=y;
  }
  return d?d+'Z':'';
}

function basemapSVG(){
  let land='',border='',labels='';
  for(const f of (china?china.features:[])){
    const gs=f.geometry.type==='Polygon'?[f.geometry.coordinates]:f.geometry.coordinates;
    let d='';
    for(const poly of gs){
      const ring=poly[0];
      let inside=false;
      for(let i=0;i<ring.length;i+=8){const c=ring[i];if(c[0]>proj.lo0-2&&c[0]<proj.lo1+2&&c[1]>proj.la0-2&&c[1]<proj.la1+2){inside=true;break;}}
      if(inside)d+=ringPath(ring);
    }
    if(d)land+=`<path d="${d}" fill="var(--land)" stroke="var(--coast)" stroke-width="1" vector-effect="non-scaling-stroke"/>`;
    const ct=f.properties.centroid||f.properties.center;
    if(ct&&proj.inView(ct[0],ct[1])){
      const nm=f.properties.name.replace(/(省|市|自治区|壮族|回族|维吾尔|特别行政区)/g,'');
      labels+=`<text x="${proj.x(ct[0]).toFixed(0)}" y="${proj.y(ct[1]).toFixed(0)}" fill="#3d6a94" font-size="var(--fs2,13px)" text-anchor="middle" letter-spacing="3">${esc(nm)}</text>`;
    }
  }
  let grid='',glab='';
  for(let lon=Math.ceil(proj.lo0/2)*2;lon<=proj.lo1;lon+=2){
    grid+=`M${proj.x(lon).toFixed(1)} 0V${H}`;
    glab+=`<text x="${(proj.x(lon)+3).toFixed(0)}" y="${H-8}" fill="#28486e" font-size="var(--fs3,11px)">${lon}°E</text>`;
  }
  for(let lat=Math.ceil(proj.la0/2)*2;lat<=proj.la1;lat+=2){
    grid+=`M0 ${proj.y(lat).toFixed(1)}H${W}`;
    glab+=`<text x="6" y="${(proj.y(lat)-4).toFixed(0)}" fill="#28486e" font-size="var(--fs3,11px)">${lat}°N</text>`;
  }
  let cities='';
  for(const c of CITIES){
    if(!proj.inView(c.lon,c.lat))continue;
    cities+=`<circle cx="${proj.x(c.lon).toFixed(1)}" cy="${proj.y(c.lat).toFixed(1)}" r="2.5" fill="#5a7fa6"/><text x="${(proj.x(c.lon)+6).toFixed(0)}" y="${(proj.y(c.lat)-5).toFixed(0)}" fill="#7d9cbe" font-size="var(--fs2,12px)">${c.n}</text>`;
  }
  return `<path d="${grid}" stroke="#12233a" stroke-width="1" fill="none" vector-effect="non-scaling-stroke"/>${land}${labels}${glab}${cities}`;
}

function windCircleSVG(pt){
  const cx=proj.x(num(pt.lng)), cy=proj.y(num(pt.lat));
  const specs=[['radius7','#fbbf24',.10],['radius10','#fb923c',.14],['radius12','#f87171',.18]];
  let out='';
  for(const [field,color,op] of specs){
    if(!pt[field])continue;
    const q=String(pt[field]).split('|').map(Number);
    if(q.length<4||q.some(isNaN)||!q.some(v=>v>0))continue;
    const [ne,se,sw,nw]=q.map(v=>proj.kmPx(v));
    const d=`M${cx} ${cy-ne}A${ne} ${ne} 0 0 1 ${cx+ne} ${cy}L${cx+se} ${cy}A${se} ${se} 0 0 1 ${cx} ${cy+se}L${cx} ${cy+sw}A${sw} ${sw} 0 0 1 ${cx-sw} ${cy}L${cx-nw} ${cy}A${nw} ${nw} 0 0 1 ${cx} ${cy-nw}Z`;
    out+=`<path d="${d}" fill="${color}" fill-opacity="${op}" stroke="${color}" stroke-opacity=".5" stroke-width="1" stroke-dasharray="4 3" vector-effect="non-scaling-stroke"/>`;
  }
  return out;
}

function tip(pt,extra){
  return esc(`${fmtT(pt.time)} · ${pt.strong||''}${pt.power?` ${pt.power}级`:''}${pt.speed?` · ${pt.speed}m/s`:''}${pt.pressure?` · ${pt.pressure}hPa`:''}${extra||''}`);
}

function render(){
  const d=state.data;
  const ty=d&&d.typhoons&&d.typhoons[state.idx];
  if(!ty||!ty.points||!ty.points.length){
    $('c-name').innerHTML='<b>当前无活跃台风</b>';
    $('world').innerHTML=`<text x="600" y="390" fill="#4a6785" font-size="20" text-anchor="middle">西太平洋当前无活跃编号台风 🌤</text>`;
    return;
  }
  const pts=ty.points, cur=pts[pts.length-1];
  const curLL={lon:num(cur.lng),lat:num(cur.lat)};
  const fcs=(cur.forecast&&cur.forecast.length?cur.forecast:(pts.findLast(p=>p.forecast&&p.forecast.length)||{}).forecast)||[];
  const cma=(fcs.find(f=>f.tm==='中国')||{}).forecastpoints||[];

  const bpts=[[JY.lon,JY.lat],[curLL.lon,curLL.lat]];
  const cutoff=Date.parse(cur.time.replace(' ','T')+'+08:00')-60*3600e3;
  pts.forEach(p=>{if(Date.parse(p.time.replace(' ','T')+'+08:00')>=cutoff)bpts.push([num(p.lng),num(p.lat)]);});
  fcs.forEach(f=>(f.forecastpoints||[]).forEach(p=>bpts.push([num(p.lng),num(p.lat)])));
  proj=makeProj(bpts);

  let svg=basemapSVG();
  svg+=windCircleSVG(cur);

  let seg='',dots='';
  for(let i=1;i<pts.length;i++){
    const a=pts[i-1],b=pts[i];
    seg+=`<line x1="${proj.x(num(a.lng)).toFixed(1)}" y1="${proj.y(num(a.lat)).toFixed(1)}" x2="${proj.x(num(b.lng)).toFixed(1)}" y2="${proj.y(num(b.lat)).toFixed(1)}" stroke="${catColor(b.strong)}" stroke-width="2.5" vector-effect="non-scaling-stroke"/>`;
  }
  pts.forEach((p,i)=>{
    const hr=+p.time.slice(11,13);
    if(i!==0&&i!==pts.length-1&&hr%6!==2)return;
    dots+=`<circle cx="${proj.x(num(p.lng)).toFixed(1)}" cy="${proj.y(num(p.lat)).toFixed(1)}" r="3.5" fill="${catColor(p.strong)}" stroke="#0a1929" stroke-width="1" data-tip="${tip(p)}"/>`;
  });

  let fcsvg='';
  for(const ag of AGENCY){
    if(!ag.on)continue;
    const fp=(fcs.find(f=>f.tm===ag.key)||{}).forecastpoints;
    if(!fp||!fp.length)continue;
    const chain=[{lng:cur.lng,lat:cur.lat},...fp];
    const line=chain.map((p,i)=>`${i?'L':'M'}${proj.x(num(p.lng)).toFixed(1)} ${proj.y(num(p.lat)).toFixed(1)}`).join('');
    fcsvg+=`<path d="${line}" fill="none" stroke="${ag.color}" stroke-width="${ag.w}" stroke-dasharray="7 5" vector-effect="non-scaling-stroke"/>`;
    fp.forEach((p,i)=>{
      const x=proj.x(num(p.lng)),y=proj.y(num(p.lat));
      fcsvg+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="#0a1929" stroke="${ag.color}" stroke-width="1.8" data-tip="${tip(p,' · '+ag.key)}"/>`;
      if(ag.key==='中国'&&i>0){
        const dy=i%2?-10:20;
        fcsvg+=`<text x="${(x+8).toFixed(0)}" y="${(y+dy).toFixed(0)}" fill="#cbd5e1" font-size="var(--fs2,12px)">${fmtT(p.time)}${p.power?' '+p.power+'级':''}</text>`;
      }
    });
  }

  const jx=proj.x(JY.lon),jy_=proj.y(JY.lat),cx=proj.x(curLL.lon),cy=proj.y(curLL.lat);
  const distNow=hav(curLL,JY);
  svg+=seg+dots+fcsvg;
  svg+=`<line x1="${cx.toFixed(1)}" y1="${cy.toFixed(1)}" x2="${jx.toFixed(1)}" y2="${jy_.toFixed(1)}" stroke="#ff8fa3" stroke-width="1" stroke-dasharray="3 4" vector-effect="non-scaling-stroke" opacity=".7"/>`;
  svg+=`<text x="${((cx+jx)/2).toFixed(0)}" y="${((cy+jy_)/2-6).toFixed(0)}" fill="#ff8fa3" font-size="var(--fs2,12px)" text-anchor="middle">${distNow}km</text>`;
  svg+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="10" fill="${catColor(cur.strong)}" opacity=".6" class="pulse"/>`;
  svg+=`<g class="spin"><path d="M${cx} ${cy}m0 -9a9 9 0 0 1 9 9 12 12 0 0 0 3 -10 12 12 0 0 1 -12 1zM${cx} ${cy}m0 9a9 9 0 0 1 -9 -9 12 12 0 0 0 -3 10 12 12 0 0 1 12 -1z" fill="${catColor(cur.strong)}"/></g>`;
  svg+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="4.5" fill="#fff" data-tip="${tip(cur,' · 现在位置')}"/>`;
  const st=(r,ir)=>{let p='';for(let i=0;i<10;i++){const rr=i%2?ir:r,a=Math.PI*(i/5)-Math.PI/2;p+=(i?'L':'M')+(jx+rr*Math.cos(a)).toFixed(1)+' '+(jy_+rr*Math.sin(a)).toFixed(1);}return p+'Z';};
  svg+=`<path d="${st(11,4.6)}" fill="var(--pink)" stroke="#fff" stroke-width="1.2" vector-effect="non-scaling-stroke"/><text x="${(jx+14).toFixed(0)}" y="${(jy_+5).toFixed(0)}" fill="#ff8fa3" font-size="var(--fs1,14px)" font-weight="600">江阴 · 你在这</text>`;
  $('world').innerHTML=svg;
  applyVT();

  $('c-name').innerHTML=`<b>${esc(ty.name)}（${esc(ty.enname)}）</b>&nbsp;${esc(ty.tfid)}号${ty.isactive==='1'?'':' · 已停编'}`;
  $('c-strong').innerHTML=`<span class="dot" style="background:${catColor(cur.strong)}"></span><b>${esc(cur.strong)} ${esc(cur.power)}级</b>&nbsp;${esc(cur.speed)}m/s · ${esc(cur.pressure)}hPa`;
  $('c-move').innerHTML=`移向 <b>${esc(cur.movedirection||'—')}</b> · ${esc(cur.movespeed||'—')}km/h`;
  $('c-time').textContent=`实况 ${fmtT(cur.time)}${d.stale?' ⚠︎旧缓存':''}${d.direct?' · 直连官方':''}`;

  const r7q=String(cur.radius7||'').split('|').map(Number);
  const east=JY.lon>=curLL.lon, north=JY.lat>=curLL.lat;
  const qi=east?(north?0:1):(north?3:2);
  const r7=r7q.length===4&&!isNaN(r7q[qi])?r7q[qi]:0;
  const al=$('alert');
  if(r7&&distNow<=r7){al.className='al-red';al.textContent=`⚠ 7级风圈已覆盖江阴（距中心${distNow}km）`;}
  else if(r7&&distNow<=r7+120){al.className='al-org';al.textContent=`⚠ 7级风圈逼近江阴（距风圈边缘约${distNow-r7}km）`;}
  else{al.className='al-ok';al.textContent=`距江阴 ${distNow}km`;}

  $('kv-now').innerHTML=`
    <div><div class="k">中心位置</div><div class="v">${esc(cur.lat)}°N / ${esc(cur.lng)}°E</div></div>
    <div><div class="k">强度</div><div class="v" style="color:${catColor(cur.strong)}">${esc(cur.strong)} ${esc(cur.power)}级（${esc(cur.speed)}m/s）</div></div>
    <div><div class="k">中心气压</div><div class="v">${esc(cur.pressure)} hPa</div></div>
    <div><div class="k">移向/移速</div><div class="v">${esc(cur.movedirection||'—')} / ${esc(cur.movespeed||'—')}km/h</div></div>
    <div><div class="k">7级风圈</div><div class="v">${esc(cur.radius7||'—')} km</div></div>
    <div><div class="k">10级风圈</div><div class="v">${esc(cur.radius10||'—')} km</div></div>`;

  let minD=1e9,minT='';
  cma.forEach(p=>{const dd=hav({lon:num(p.lng),lat:num(p.lat)},JY);if(dd<minD){minD=dd;minT=fmtT(p.time);}});
  if(distNow<minD){minD=distNow;minT='现在';}
  $('jy-body').innerHTML=`
    <div style="display:flex;gap:20px;align-items:baseline;flex-wrap:wrap">
      <div><div class="k" style="color:var(--fg3);font-size:12px">当前距离</div><div class="big" style="color:${distNow<300?'#ffb454':'#4ade80'}">${distNow}<span style="font-size:14px"> km</span></div></div>
      <div><div class="k" style="color:var(--fg3);font-size:12px">预计最近</div><div class="big" style="color:#ffb454">${minD===1e9?'—':minD}<span style="font-size:14px"> km</span></div><div style="font-size:12px;color:var(--fg3)">${esc(minT)}</div></div>
      <div><div class="k" style="color:var(--fg3);font-size:12px">风险等级</div><div class="big" style="color:#ffb454">较重</div></div>
    </div>
    <div style="font-size:12.5px;color:var(--fg2);margin-top:10px;line-height:1.7">江阴市气象局警报：11–13日阵风<b style="color:var(--fg)">7~10级</b>（最强<b style="color:var(--fg)">12日白天</b>），长江江面9~10级；累计雨量50~90mm，主要在12日后半夜至13日。<b style="color:#ffb454">风大于雨</b>，江阴处路径右侧危险半圆。</div>`;

  let rows='<tr><th>时间</th><th>位置</th><th>强度</th><th>气压</th><th>距江阴</th></tr>';
  cma.forEach((p,i)=>{
    if(i===0&&p.time===cur.time)return;
    const dd=hav({lon:num(p.lng),lat:num(p.lat)},JY);
    rows+=`<tr><td>${fmtT(p.time)}</td><td>${esc(p.lat)}°N ${esc(p.lng)}°E</td><td style="color:${catColor(p.strong)}">${esc(p.strong)} ${esc(p.power)}级</td><td>${esc(p.pressure)}</td><td${dd<=250?' style="color:#ffb454;font-weight:600"':''}>${dd}km</td></tr>`;
  });
  $('fc-table').innerHTML=rows;

  $('legend').innerHTML=Object.entries(CAT_COLOR).map(([k,c])=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:8px"><span class="dot" style="background:${c};width:8px;height:8px"></span>${k}</span>`).join('')
    +`<br><span class="ln" style="border-top-style:solid;border-color:#94a3b8"></span> 已过路径 &nbsp;<span class="ln" style="border-top-style:dashed;border-color:#ff5757"></span> 预报路径 &nbsp;<span style="color:#fbbf24">◌</span> 7/10/12级风圈（示意）`;

  $('agencies').innerHTML='<div style="color:var(--fg3);margin-bottom:4px">预报机构对比</div>'+AGENCY.map((a,i)=>`<label><input type="checkbox" data-i="${i}" ${a.on?'checked':''}><span class="ln" style="border-top-style:dashed;border-color:${a.color}"></span>${a.key}</label>`).join('');
  $('agencies').querySelectorAll('input').forEach(cb=>cb.addEventListener('change',e=>{AGENCY[+e.target.dataset.i].on=e.target.checked;render();}));
}

function applyVT(){
  const g=$('world');
  g.setAttribute('transform',`translate(${vt.x},${vt.y}) scale(${vt.k})`);
  g.style.setProperty('--fs1',(14/vt.k)+'px');
  g.style.setProperty('--fs2',(12/vt.k)+'px');
  g.style.setProperty('--fs3',(11/vt.k)+'px');
}
function zoomAt(px,py,f){
  const k2=Math.min(8,Math.max(.5,vt.k*f));f=k2/vt.k;
  vt.x=px-(px-vt.x)*f;vt.y=py-(py-vt.y)*f;vt.k=k2;applyVT();
}
const map=$('map');
function evPt(e){const r=map.getBoundingClientRect();return[(e.clientX-r.left)*W/r.width,(e.clientY-r.top)*H/r.height];}
map.addEventListener('wheel',e=>{e.preventDefault();const[p,q]=evPt(e);zoomAt(p,q,e.deltaY<0?1.25:.8);},{passive:false});
let drag=null;
map.addEventListener('pointerdown',e=>{drag=[...evPt(e),vt.x,vt.y];map.classList.add('panning');map.setPointerCapture(e.pointerId);});
map.addEventListener('pointermove',e=>{
  if(drag){const[p,q]=evPt(e);vt.x=drag[2]+p-drag[0];vt.y=drag[3]+q-drag[1];applyVT();return;}
  const t=e.target.getAttribute&&e.target.getAttribute('data-tip');
  const tt=$('tooltip');
  if(t){const r=$('map-wrap').getBoundingClientRect();tt.style.display='block';tt.style.left=Math.min(e.clientX-r.left+14,r.width-220)+'px';tt.style.top=(e.clientY-r.top+10)+'px';tt.textContent=t;}
  else tt.style.display='none';
});
map.addEventListener('pointerup',()=>{drag=null;map.classList.remove('panning');});
$('z-in').onclick=()=>zoomAt(W/2,H/2,1.3);
$('z-out').onclick=()=>zoomAt(W/2,H/2,.77);
$('z-reset').onclick=()=>{vt={x:0,y:0,k:1};applyVT();};

const UP='https://typhoon.slt.zj.gov.cn/Api';
async function fetchDirect(){
  const year=new Date().getFullYear();
  const list=await(await fetch(`${UP}/TyphoonList/${year}`)).json();
  const active=(list||[]).filter(t=>t.isactive==='1');
  const typhoons=[];
  for(const t of active){
    const info=await(await fetch(`${UP}/TyphoonInfo/${t.tfid}`)).json().catch(()=>null);
    if(info)typhoons.push(info);
  }
  return {fetchedAt:new Date().toISOString(), typhoons, stale:false, direct:true};
}
async function load(){
  $('countdown').textContent='刷新中…';
  let ok=false;
  try{
    const res=await fetch('/api/active',{cache:'no-store'});
    if(!res.ok)throw new Error('本地服务 '+res.status);
    state.data=await res.json();ok=true;
  }catch(e1){
    try{state.data=await fetchDirect();ok=true;}
    catch(e2){
      $('alert').className='al-org';
      $('alert').textContent=`数据获取失败（${String(e2.message||e2).slice(0,60)}），60秒后重试`;
    }
  }
  if(ok){
    if(state.idx>=(state.data.typhoons||[]).length)state.idx=0;
    render();
  }
  nextAt=Date.now()+(ok?REFRESH_MS:60*1000);
}
$('btn-refresh').onclick=load;
setInterval(()=>{
  const s=Math.max(0,Math.round((nextAt-Date.now())/1000));
  $('countdown').textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}后自动刷新`;
  if(Date.now()>=nextAt&&nextAt)load();
},1000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&Date.now()>nextAt-REFRESH_MS+60e3)load();});

(async()=>{
  try{china=await(await fetch('china.json')).json();}
  catch(e){
    try{china=await(await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')).json();}
    catch(e2){china=null;}
  }
  await load();
})();
</script>
